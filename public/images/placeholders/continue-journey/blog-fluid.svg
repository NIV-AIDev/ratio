<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fluid abstract visual for blog card</title>
  <desc id="desc">Editorial-inspired layered gradients, flowing contours, and kinetic highlights to represent journal content and ideas in motion.</desc>

  <defs>
    <linearGradient id="bg" x1="150" y1="40" x2="1490" y2="930" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12171E" />
      <stop offset="0.52" stop-color="#1A212C" />
      <stop offset="1" stop-color="#0D1218" />
    </linearGradient>

    <radialGradient id="amberGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(430 255) rotate(20) scale(650 500)">
      <stop stop-color="#E5C192" stop-opacity="0.8" />
      <stop offset="1" stop-color="#E5C192" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="azureGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1235 760) rotate(-17) scale(700 560)">
      <stop stop-color="#8FB5D1" stop-opacity="0.58" />
      <stop offset="1" stop-color="#8FB5D1" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="flowOne" x1="220" y1="165" x2="1400" y2="808" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2DDC1" stop-opacity="0.72" />
      <stop offset="0.45" stop-color="#D2B189" stop-opacity="0.39" />
      <stop offset="1" stop-color="#A98767" stop-opacity="0.08" />
    </linearGradient>

    <linearGradient id="flowTwo" x1="1388" y1="216" x2="206" y2="894" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8E8F2" stop-opacity="0.62" />
      <stop offset="0.57" stop-color="#AFC9DD" stop-opacity="0.33" />
      <stop offset="1" stop-color="#8CAFC6" stop-opacity="0.08" />
    </linearGradient>

    <linearGradient id="inkSweep" x1="110" y1="465" x2="1490" y2="465" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5E8D5" stop-opacity="0" />
      <stop offset="0.5" stop-color="#F5E8D5" stop-opacity="0.72" />
      <stop offset="1" stop-color="#F5E8D5" stop-opacity="0" />
    </linearGradient>

    <filter id="glowBlur" x="-220" y="-220" width="2040" height="1440" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="58" />
    </filter>

    <filter id="fineBlur" x="70" y="70" width="1460" height="870" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.7" />
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)" />
  <rect width="1600" height="1000" fill="url(#amberGlow)" />
  <rect width="1600" height="1000" fill="url(#azureGlow)" />

  <g filter="url(#glowBlur)">
    <ellipse cx="410" cy="205" rx="272" ry="192" fill="#EFD3AE" fill-opacity="0.3">
      <animate attributeName="cx" values="410;458;410" dur="15s" repeatCount="indefinite" />
      <animate attributeName="cy" values="205;170;205" dur="15s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="1222" cy="792" rx="315" ry="226" fill="#95B8CF" fill-opacity="0.24">
      <animate attributeName="cx" values="1222;1172;1222" dur="17s" repeatCount="indefinite" />
      <animate attributeName="cy" values="792;822;792" dur="17s" repeatCount="indefinite" />
    </ellipse>
  </g>

  <path d="M90 548C256 449 389 420 565 461C760 506 886 644 1098 680C1261 709 1422 653 1512 588V1000H90V548Z" fill="url(#flowOne)">
    <animate attributeName="d" dur="19s" repeatCount="indefinite" values="M90 548C256 449 389 420 565 461C760 506 886 644 1098 680C1261 709 1422 653 1512 588V1000H90V548Z;M90 566C278 441 404 406 590 447C782 489 918 643 1128 684C1298 717 1418 682 1512 612V1000H90V566Z;M90 548C256 449 389 420 565 461C760 506 886 644 1098 680C1261 709 1422 653 1512 588V1000H90V548Z" />
  </path>

  <path d="M150 468C334 339 531 308 712 362C898 418 1022 547 1243 569C1355 580 1446 558 1512 520V1000H150V468Z" fill="url(#flowTwo)">
    <animate attributeName="d" dur="21s" repeatCount="indefinite" values="M150 468C334 339 531 308 712 362C898 418 1022 547 1243 569C1355 580 1446 558 1512 520V1000H150V468Z;M150 486C352 326 521 300 739 358C922 405 1057 539 1260 563C1384 579 1462 569 1512 538V1000H150V486Z;M150 468C334 339 531 308 712 362C898 418 1022 547 1243 569C1355 580 1446 558 1512 520V1000H150V468Z" />
  </path>

  <g filter="url(#fineBlur)" stroke-linecap="round">
    <path d="M126 598C306 541 472 551 632 620C794 689 969 707 1178 655C1286 628 1384 592 1468 538" stroke="#F4E8D7" stroke-opacity="0.58" stroke-width="2.2" />
    <path d="M170 680C344 636 506 661 674 732C836 801 1009 812 1210 765C1313 742 1402 705 1474 660" stroke="#D6E5EF" stroke-opacity="0.5" stroke-width="2" />
    <path d="M132 760C302 720 470 744 626 808C789 875 966 883 1154 844C1262 821 1354 790 1439 740" stroke="url(#inkSweep)" stroke-width="1.8" stroke-opacity="0.72" />
  </g>

  <g fill="#EED6B2" fill-opacity="0.85">
    <circle cx="1304" cy="246" r="5" />
    <circle cx="1360" cy="278" r="4" fill-opacity="0.62" />
    <circle cx="1406" cy="328" r="3.3" fill-opacity="0.48" />
  </g>
</svg>
